<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elias Online - IT Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="setup">
            <h1>ALIAS ONLINE</h1>
            <input type="text" id="username" placeholder="Твій нік">
            
            <div id="room-list-container">
                <h3>Доступні кімнати:</h3>
                <div id="rooms-list">Завантаження списку...</div>
            </div>

            <div id="create-room-form">
                <input type="text" id="room-id" placeholder="Назва кімнати">
                <div class="settings-row">
                    <label>Таймер (сек):</label>
                    <input type="number" id="round-time" value="60" min="10">
                </div>
                <button id="join-btn">СТВОРИТИ / УВІЙТИ</button>
            </div>
        </div>

        <div id="game" style="display: none;">
            <div id="timer">60s</div>
            <div id="word-display">Чекаємо на старт...</div>
            
            <div id="challenge-zone" style="display: none;">
                <p>⚠️ ЙДЕ ОСКАРЖЕННЯ...</p>
            </div>

            <div id="controls" style="display: none;">
                <button id="correct-btn" class="btn-green">✅ Вгадали</button>
                <button id="skip-btn" class="btn-red">❌ Пропустити</button>
            </div>

            <div id="scoreboard"></div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
